---
- name: Build dynamic deployment inventory
  hosts: localhost
  gather_facts: false

  vars:
    dynamic_target_group: dynamic_app_servers
    dynamic_target_name: "{{ vm_name | default('dynamic-app-target') }}"

  tasks:
    - name: Validate dynamic VM input
      ansible.builtin.assert:
        that:
          - vm_ip is defined
          - vm_ip | string | trim | length > 0
          - vm_user is defined
          - vm_user | string | trim | length > 0
          - vm_password is defined or vm_ssh_private_key_file is defined
        fail_msg: "Set vm_ip, vm_user, and either vm_password or vm_ssh_private_key_file."

    - name: Add VM from Semaphore input
      ansible.builtin.add_host:
        name: "{{ dynamic_target_name }}"
        groups: "{{ dynamic_target_group }}"
        ansible_host: "{{ vm_ip | string | trim }}"
        ansible_user: "{{ vm_user | string | trim }}"
        ansible_port: "{{ vm_port | default(omit) }}"
        ansible_connection: ssh
        ansible_password: "{{ vm_password | default(omit) }}"
        ansible_become_password: "{{ vm_become_password | default(vm_password | default(omit)) }}"
        ansible_ssh_private_key_file: "{{ vm_ssh_private_key_file | default(omit) }}"
        ansible_ssh_common_args: "{{ vm_ssh_common_args | default('-o StrictHostKeyChecking=no') }}"
      no_log: true

- name: Deploy selected application to dynamic VM
  hosts: dynamic_app_servers
  become: true
  gather_facts: true

  vars:
    supported_apps:
      n8n: apps/n8n_queue
      n8n_queue: apps/n8n_queue

  pre_tasks:
    - name: Normalize selected app name
      ansible.builtin.set_fact:
        selected_app_name: "{{ app_name | default(deploy_app | default(application | default(''))) | string | trim }}"

    - name: Validate selected app
      ansible.builtin.assert:
        that:
          - selected_app_name | length > 0
          - selected_app_name in supported_apps
        fail_msg: "Set app_name to one of: {{ supported_apps.keys() | list | join(', ') }}."

  roles:
    - role: docker_host

  tasks:
    - name: Deploy app role
      ansible.builtin.include_role:
        name: "{{ supported_apps[selected_app_name] }}"
