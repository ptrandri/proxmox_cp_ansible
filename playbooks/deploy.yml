---
- name: Build dynamic deployment inventory when vm_ip is provided
  hosts: localhost
  gather_facts: false

  vars:
    dynamic_target_group: dynamic_app_servers
    dynamic_target_name: "{{ vm_name | default('dynamic-app-target') }}"

  tasks:
    - name: Validate dynamic VM input
      ansible.builtin.assert:
        that:
          - vm_user is defined
          - vm_user | string | trim | length > 0
          - vm_password is defined or vm_ssh_private_key_file is defined or vm_ssh_private_key is defined
        fail_msg: "When vm_ip is provided, also set vm_user and one of: vm_password, vm_ssh_private_key_file, or vm_ssh_private_key."
      when: vm_ip is defined and (vm_ip | string | trim | length > 0)

    - name: Create temporary SSH private key file from dynamic input
      ansible.builtin.tempfile:
        state: file
        suffix: .pem
      register: dynamic_ssh_private_key_file
      when:
        - vm_ip is defined and (vm_ip | string | trim | length > 0)
        - vm_ssh_private_key is defined
        - vm_ssh_private_key | string | trim | length > 0
      no_log: true

    - name: Write dynamic SSH private key
      ansible.builtin.copy:
        content: "{{ (vm_ssh_private_key | string | replace('\\r\\n', '\n') | replace('\\n', '\n')) ~ '\n' }}"
        dest: "{{ dynamic_ssh_private_key_file.path }}"
        mode: "0600"
      when:
        - dynamic_ssh_private_key_file is defined
        - dynamic_ssh_private_key_file.path is defined
      no_log: true

    - name: Add VM from dynamic input
      ansible.builtin.add_host:
        name: "{{ dynamic_target_name }}"
        groups: "{{ dynamic_target_group }}"
        ansible_host: "{{ vm_ip | string | trim }}"
        ansible_user: "{{ vm_user | string | trim }}"
        ansible_port: "{{ vm_port | default(omit) }}"
        ansible_connection: ssh
        ansible_password: "{{ vm_password | default(omit) }}"
        ansible_become_password: "{{ vm_become_password | default(vm_password | default(omit)) }}"
        ansible_ssh_private_key_file: "{{ dynamic_ssh_private_key_file.path | default(vm_ssh_private_key_file | default(omit)) }}"
        ansible_ssh_common_args: "{{ vm_ssh_common_args | default('-o StrictHostKeyChecking=no -o IdentitiesOnly=yes') }}"
        deploy_become: "{{ vm_become | default((vm_user | string | trim) != 'root') }}"
      when: vm_ip is defined and (vm_ip | string | trim | length > 0)
      no_log: true

- name: Deploy selected application
  hosts: "{{ 'dynamic_app_servers' if (vm_ip is defined and (vm_ip | string | trim | length > 0)) else (target_hosts | default('all')) }}"
  become: "{{ deploy_become | default(true) }}"
  gather_facts: true

  vars:
    supported_apps:
      n8n: apps/n8n_queue
      n8n_queue: apps/n8n_queue

  pre_tasks:
    - name: Normalize selected app name
      ansible.builtin.set_fact:
        selected_app_name: "{{ app_name | default(deploy_app | default(application | default(''))) | string | trim }}"

    - name: Validate selected app
      ansible.builtin.assert:
        that:
          - selected_app_name | length > 0
          - selected_app_name in supported_apps
        fail_msg: "Set app_name to one of: {{ supported_apps.keys() | list | join(', ') }}."

  roles:
    - role: docker_host

  tasks:
    - name: Deploy app role
      ansible.builtin.include_role:
        name: "{{ supported_apps[selected_app_name] }}"
