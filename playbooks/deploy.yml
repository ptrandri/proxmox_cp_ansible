---
- name: Deploy selected application
  hosts: "{{ target_hosts | default('app_servers') }}"
  become: true
  gather_facts: true

  vars:
    supported_apps:
      n8n: apps/n8n_queue
      n8n_queue: apps/n8n_queue

  pre_tasks:
    - name: Normalize selected app name
      ansible.builtin.set_fact:
        selected_app_name: "{{ app_name | default(deploy_app | default(application | default(''))) | string | trim }}"

    - name: Validate selected app
      ansible.builtin.assert:
        that:
          - selected_app_name | length > 0
          - selected_app_name in supported_apps
        fail_msg: "Set app_name to one of: {{ supported_apps.keys() | list | join(', ') }}."

  roles:
    - role: docker_host

  tasks:
    - name: Deploy app role
      ansible.builtin.include_role:
        name: "{{ supported_apps[selected_app_name] }}"

