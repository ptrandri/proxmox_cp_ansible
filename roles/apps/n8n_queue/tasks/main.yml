---
- name: Normalize n8n deployment variables
  ansible.builtin.set_fact:
    n8n_domain_input: "{{ app_domain | default(domain | default(n8n_domain | default(''))) | string | trim }}"
    n8n_timezone_effective: "{{ app_timezone | default(timezone | default(n8n_timezone | default(n8n_timezone_default))) | string | trim }}"
    n8n_owner_email: "{{ n8n_username | default(app_admin_username | default(owner_email | default(''))) | string | trim }}"
    n8n_app_basic_auth_effective: "{{ app_basic_auth | default(false) | bool }}"
  no_log: true

- name: Build n8n public URL from domain
  ansible.builtin.set_fact:
    n8n_service_url_effective: >-
      {{
        n8n_service_url
        | default(
            (
              n8n_domain_input
              if (n8n_domain_input is match('^https?://'))
              else 'https://' ~ n8n_domain_input
            )
            if (n8n_domain_input | length > 0)
            else 'http://' ~ (ansible_host | default(inventory_hostname)),
            true
          )
      }}

- name: Derive n8n host and protocol
  ansible.builtin.set_fact:
    n8n_host_effective: "{{ n8n_service_url_effective | regex_replace('^https?://', '') | regex_replace('/.*$', '') }}"
    n8n_protocol_effective: "{{ 'https' if (n8n_service_url_effective is match('^https://')) else 'http' }}"
    n8n_secure_cookie_effective: "{{ n8n_secure_cookie | default(n8n_service_url_effective is match('^https://')) }}"

- name: Check existing n8n environment file
  ansible.builtin.stat:
    path: "{{ n8n_project_dir }}/.env"
  register: n8n_env_file
  no_log: true

- name: Read existing n8n environment file
  ansible.builtin.slurp:
    path: "{{ n8n_project_dir }}/.env"
  register: n8n_existing_env
  when: n8n_env_file.stat.exists
  no_log: true

- name: Extract existing generated n8n secrets
  ansible.builtin.set_fact:
    n8n_existing_postgres_user: "{{ (n8n_existing_env.content | b64decode | regex_search('(?m)^SERVICE_USER_POSTGRES=.*$') | default('', true) | regex_replace('^SERVICE_USER_POSTGRES=', '') | regex_replace('^\"|\"$', '') | replace('$$', '$')) }}"
    n8n_existing_postgres_password: "{{ (n8n_existing_env.content | b64decode | regex_search('(?m)^SERVICE_PASSWORD_POSTGRES=.*$') | default('', true) | regex_replace('^SERVICE_PASSWORD_POSTGRES=', '') | regex_replace('^\"|\"$', '') | replace('$$', '$')) }}"
    n8n_existing_redis_password: "{{ (n8n_existing_env.content | b64decode | regex_search('(?m)^SERVICE_PASSWORD_REDIS=.*$') | default('', true) | regex_replace('^SERVICE_PASSWORD_REDIS=', '') | regex_replace('^\"|\"$', '') | replace('$$', '$')) }}"
    n8n_existing_encryption_key: "{{ (n8n_existing_env.content | b64decode | regex_search('(?m)^SERVICE_PASSWORD_ENCRYPTION=.*$') | default('', true) | regex_replace('^SERVICE_PASSWORD_ENCRYPTION=', '') | regex_replace('^\"|\"$', '') | replace('$$', '$')) }}"
  when: n8n_existing_env is defined and n8n_existing_env.content is defined
  no_log: true

- name: Generate missing n8n service secrets
  ansible.builtin.set_fact:
    n8n_generated_postgres_user: "n8n_{{ lookup('ansible.builtin.password', '/dev/null', chars=['ascii_lowercase', 'digits'], length=10) }}"
    n8n_generated_postgres_password: "{{ lookup('ansible.builtin.password', '/dev/null', chars=['ascii_letters', 'digits'], length=32) }}"
    n8n_generated_redis_password: "{{ lookup('ansible.builtin.password', '/dev/null', chars=['ascii_letters', 'digits'], length=32) }}"
    n8n_generated_encryption_key: "{{ lookup('ansible.builtin.password', '/dev/null', chars=['ascii_letters', 'digits'], length=48) }}"
  no_log: true

- name: Normalize supplied n8n service secret inputs
  ansible.builtin.set_fact:
    n8n_postgres_user_input: "{{ n8n_postgres_user | default('') }}"
    n8n_postgres_password_input: "{{ '' if (n8n_postgres_password | default('')) == 'CHANGE_ME_POSTGRES_PASSWORD' else (n8n_postgres_password | default('')) }}"
    n8n_redis_password_input: "{{ '' if (n8n_redis_password | default('')) == 'CHANGE_ME_REDIS_PASSWORD' else (n8n_redis_password | default('')) }}"
    n8n_encryption_key_input: "{{ '' if (n8n_encryption_key | default('')) == 'CHANGE_ME_LONG_RANDOM_ENCRYPTION_KEY' else (n8n_encryption_key | default('')) }}"
  no_log: true

- name: Normalize n8n service secrets
  ansible.builtin.set_fact:
    n8n_postgres_user_effective: "{{ n8n_postgres_user_input | default(n8n_existing_postgres_user | default(''), true) | default(n8n_generated_postgres_user, true) }}"
    n8n_postgres_password_effective: "{{ n8n_postgres_password_input | default(n8n_existing_postgres_password | default(''), true) | default(n8n_generated_postgres_password, true) }}"
    n8n_redis_password_effective: "{{ n8n_redis_password_input | default(n8n_existing_redis_password | default(''), true) | default(n8n_generated_redis_password, true) }}"
    n8n_encryption_key_effective: "{{ n8n_encryption_key_input | default(n8n_existing_encryption_key | default(''), true) | default(n8n_generated_encryption_key, true) }}"
  no_log: true

- name: Validate required n8n variables
  ansible.builtin.assert:
    that:
      - n8n_postgres_user_effective is defined and n8n_postgres_user_effective | length > 0
      - n8n_postgres_password_effective is defined and n8n_postgres_password_effective | length > 0
      - n8n_redis_password_effective is defined and n8n_redis_password_effective | length > 0
      - n8n_encryption_key_effective is defined and n8n_encryption_key_effective | length > 0
      - n8n_postgres_password_effective != 'CHANGE_ME_POSTGRES_PASSWORD'
      - n8n_redis_password_effective != 'CHANGE_ME_REDIS_PASSWORD'
      - n8n_encryption_key_effective != 'CHANGE_ME_LONG_RANDOM_ENCRYPTION_KEY'
      - n8n_domain_input | length > 0 or n8n_service_url is defined
      - n8n_timezone_effective | length > 0
      - (not n8n_app_basic_auth_effective) or (n8n_owner_email | length > 0)
      - (not n8n_app_basic_auth_effective) or (n8n_password_hash | default('') | string | length > 0) or (n8n_password | default(app_admin_password | default('')) | string | length > 0)
      - (not n8n_app_basic_auth_effective) or (n8n_password_hash | default('') | string | length > 0) or ((n8n_password | default(app_admin_password | default(''))) != 'CHANGE_ME_N8N_OWNER_PASSWORD')
    fail_msg: "For app_name=n8n_queue, set app_domain and app_timezone. If app_basic_auth=true, also set app_admin_username and app_admin_password."

- name: Normalize n8n owner password
  ansible.builtin.set_fact:
    n8n_owner_password: "{{ n8n_password | default(app_admin_password) }}"
  when:
    - n8n_app_basic_auth_effective | bool
    - n8n_password_hash is not defined or (n8n_password_hash | string | length == 0)
  no_log: true

- name: Use supplied n8n owner password hash
  ansible.builtin.set_fact:
    n8n_password_hash_effective: "{{ n8n_password_hash }}"
  when:
    - n8n_app_basic_auth_effective | bool
    - n8n_password_hash is defined and (n8n_password_hash | string | length > 0)
  no_log: true

- name: Generate n8n owner password hash from supplied password
  ansible.builtin.set_fact:
    n8n_password_hash_effective: "{{ n8n_owner_password | password_hash('bcrypt', (n8n_encryption_key_effective | hash('sha256'))[:22]) }}"
  when:
    - n8n_app_basic_auth_effective | bool
    - n8n_password_hash_effective is not defined
  no_log: true

- name: Create n8n project directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ n8n_project_dir }}"
    - "{{ n8n_project_dir }}/local-files"

- name: Render n8n Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ n8n_project_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"

- name: Render n8n environment file
  ansible.builtin.template:
    src: n8n.env.j2
    dest: "{{ n8n_project_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Check existing n8n Compose file
  ansible.builtin.stat:
    path: "{{ n8n_project_dir }}/docker-compose.yml"
  register: n8n_compose_file

- name: Clean existing n8n stack and volumes
  when:
    - n8n_clean_install | bool
    - n8n_compose_file.stat.exists
  block:
    - name: Stop n8n stack and remove project volumes
      community.docker.docker_compose_v2:
        project_src: "{{ n8n_project_dir }}"
        state: absent
        remove_volumes: true
        remove_orphans: true
      failed_when: false

    - name: Remove n8n named volumes defensively
      community.docker.docker_volume:
        name: "{{ item }}"
        state: absent
      loop:
        - n8n_n8n-data
        - n8n_postgresql-data
        - n8n_redis-data
      failed_when: false

- name: Deploy n8n stack
  block:
    - name: Deploy n8n stack with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ n8n_project_dir }}"
        state: present
        pull: always
        remove_orphans: true

    - name: Wait for n8n master HTTP health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ n8n_public_port }}/healthz"
        status_code: 200
        return_content: false
      register: n8n_health_check
      retries: 24
      delay: 5
      until: n8n_health_check.status == 200

  rescue:
    - name: Read rendered n8n Docker Compose file after failure
      ansible.builtin.command:
        cmd: cat docker-compose.yml
        chdir: "{{ n8n_project_dir }}"
      register: n8n_rendered_compose
      changed_when: false
      failed_when: false

    - name: Collect n8n compose status after failure
      ansible.builtin.command:
        cmd: docker compose ps
        chdir: "{{ n8n_project_dir }}"
      register: n8n_compose_ps
      changed_when: false
      failed_when: false

    - name: Collect n8n master logs after failure
      ansible.builtin.command:
        cmd: docker compose logs --no-color --tail=120 n8n
        chdir: "{{ n8n_project_dir }}"
      register: n8n_master_logs
      changed_when: false
      failed_when: false

    - name: Collect n8n database logs after failure
      ansible.builtin.command:
        cmd: docker compose logs --no-color --tail=80 postgresql
        chdir: "{{ n8n_project_dir }}"
      register: n8n_postgres_logs
      changed_when: false
      failed_when: false

    - name: Show n8n diagnostics
      ansible.builtin.debug:
        msg:
          - "rendered docker-compose.yml:"
          - "{{ n8n_rendered_compose.stdout_lines | default([]) }}"
          - "docker compose ps:"
          - "{{ n8n_compose_ps.stdout_lines | default([]) }}"
          - "n8n logs:"
          - "{{ n8n_master_logs.stdout_lines | default([]) }}"
          - "postgresql logs:"
          - "{{ n8n_postgres_logs.stdout_lines | default([]) }}"

    - name: Fail n8n deployment with diagnostics
      ansible.builtin.fail:
        msg: |-
          n8n stack did not become healthy.

          docker compose ps:
          {{ n8n_compose_ps.stdout | default('') }}

          n8n logs:
          {{ n8n_master_logs.stdout | default('') }}

          postgresql logs:
          {{ n8n_postgres_logs.stdout | default('') }}
