---
- name: Normalize n8n deployment variables
  ansible.builtin.set_fact:
    n8n_domain_input: "{{ domain | default(app_domain | default(n8n_domain | default(''))) | string | trim }}"
    n8n_timezone_effective: "{{ timezone | default(app_timezone | default(n8n_timezone | default(n8n_timezone_default))) | string | trim }}"
    n8n_owner_email: "{{ n8n_username | default(app_admin_username | default(owner_email | default(''))) | string | trim }}"
  no_log: true

- name: Build n8n public URL from domain
  ansible.builtin.set_fact:
    n8n_service_url_effective: >-
      {{
        n8n_service_url
        | default(
            (
              n8n_domain_input
              if (n8n_domain_input is match('^https?://'))
              else 'https://' ~ n8n_domain_input
            )
            if (n8n_domain_input | length > 0)
            else 'http://' ~ (ansible_host | default(inventory_hostname)),
            true
          )
      }}

- name: Derive n8n host and protocol
  ansible.builtin.set_fact:
    n8n_host_effective: "{{ n8n_service_url_effective | regex_replace('^https?://', '') | regex_replace('/.*$', '') }}"
    n8n_protocol_effective: "{{ 'https' if (n8n_service_url_effective is match('^https://')) else 'http' }}"
    n8n_secure_cookie_effective: "{{ n8n_secure_cookie | default(n8n_service_url_effective is match('^https://')) }}"

- name: Validate required n8n variables
  ansible.builtin.assert:
    that:
      - n8n_postgres_password is defined and n8n_postgres_password != 'CHANGE_ME_POSTGRES_PASSWORD'
      - n8n_redis_password is defined and n8n_redis_password != 'CHANGE_ME_REDIS_PASSWORD'
      - n8n_encryption_key is defined and n8n_encryption_key != 'CHANGE_ME_LONG_RANDOM_ENCRYPTION_KEY'
      - n8n_domain_input | length > 0 or n8n_service_url is defined
      - n8n_owner_email | length > 0
      - n8n_timezone_effective | length > 0
      - (n8n_password_hash | default('') | string | length > 0) or (n8n_password | default(app_admin_password | default('')) | string | length > 0)
      - (n8n_password_hash | default('') | string | length > 0) or ((n8n_password | default(app_admin_password | default(''))) != 'CHANGE_ME_N8N_OWNER_PASSWORD')
    fail_msg: "For app_name=n8n_queue, set domain, timezone, app_admin_username, app_admin_password, n8n_postgres_password, n8n_redis_password, and n8n_encryption_key."

- name: Normalize n8n owner password
  ansible.builtin.set_fact:
    n8n_owner_password: "{{ n8n_password | default(app_admin_password) }}"
  when: n8n_password_hash is not defined or (n8n_password_hash | string | length == 0)
  no_log: true

- name: Use supplied n8n owner password hash
  ansible.builtin.set_fact:
    n8n_password_hash_effective: "{{ n8n_password_hash }}"
  when: n8n_password_hash is defined and (n8n_password_hash | string | length > 0)
  no_log: true

- name: Generate n8n owner password hash from supplied password
  ansible.builtin.set_fact:
    n8n_password_hash_effective: "{{ n8n_owner_password | password_hash('bcrypt', (n8n_encryption_key | hash('sha256'))[:22]) }}"
  when: n8n_password_hash_effective is not defined
  no_log: true

- name: Create n8n project directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ n8n_project_dir }}"
    - "{{ n8n_project_dir }}/local-files"

- name: Render n8n Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ n8n_project_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"

- name: Render n8n environment file
  ansible.builtin.template:
    src: n8n.env.j2
    dest: "{{ n8n_project_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Deploy n8n stack
  community.docker.docker_compose_v2:
    project_src: "{{ n8n_project_dir }}"
    state: present
    pull: always
